<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MultiGPS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #111;
      color: #ddd;
      width: 280px;
      padding: 12px;
    }
    h1 { color: #4cf; font-size: 1rem; margin-bottom: 8px; }
    .row { display: flex; align-items: center; margin-bottom: 8px; gap: 6px; }
    label { color: #888; font-size: 0.8rem; flex-shrink: 0; }
    input[type="text"] {
      flex: 1;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 0.85rem;
    }
    input[type="checkbox"] { accent-color: #4cf; width: 14px; height: 14px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    .status-dot.ok  { background: #5f5; }
    .status-dot.err { background: #f55; }
    #status-text { font-size: 0.8rem; color: #888; }
    .divider { border: none; border-top: 1px solid #333; margin: 8px 0; }
    .coords { font-size: 0.8rem; }
    .coords td:first-child { color: #888; padding-right: 8px; }
    .coords td:last-child  { color: #eee; }
    button {
      background: #135; color: #9cf;
      border: 1px solid #357; border-radius: 3px;
      padding: 2px 8px; cursor: pointer;
      font-family: monospace; font-size: 0.8rem;
    }
    button:hover { background: #246; }
  </style>
</head>
<body>
  <h1>MultiGPS</h1>

  <div class="row">
    <label>Enabled</label>
    <input type="checkbox" id="enabled">
  </div>

  <div class="row">
    <label>Server</label>
    <input type="text" id="server-url" placeholder="http://localhost:8080">
    <button id="save-btn">Save</button>
  </div>

  <hr class="divider">

  <div class="row">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">—</span>
  </div>

  <hr class="divider">

  <table class="coords">
    <tr><td>Latitude</td>  <td id="c-lat">—</td></tr>
    <tr><td>Longitude</td> <td id="c-lon">—</td></tr>
    <tr><td>Altitude</td>  <td id="c-alt">—</td></tr>
    <tr><td>Speed</td>     <td id="c-speed">—</td></tr>
    <tr><td>Heading</td>   <td id="c-course">—</td></tr>
    <tr><td>Accuracy</td>  <td id="c-accuracy">—</td></tr>
  </table>

  <script src="popup.js"></script>
</body>
</html>
